version: '3.8'

services:

  # ─── Database ───────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: dit-db
    environment:
      POSTGRES_DB: ditlibrary
      POSTGRES_USER: dituser
      POSTGRES_PASSWORD: ditpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dituser -d ditlibrary"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Books Microservice ─────────────────────────────────────
  books-service:
    build:
      context: ./services/books
      dockerfile: Dockerfile
    container_name: dit-books
    environment:
      DATABASE_URL: postgresql://dituser:ditpass@db:5432/ditlibrary
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5001/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Users Microservice ─────────────────────────────────────
  users-service:
    build:
      context: ./services/users
      dockerfile: Dockerfile
    container_name: dit-users
    environment:
      DATABASE_URL: postgresql://dituser:ditpass@db:5432/ditlibrary
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5002/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Loans Microservice ─────────────────────────────────────
  loans-service:
    build:
      context: ./services/loans
      dockerfile: Dockerfile
    container_name: dit-loans
    environment:
      DATABASE_URL: postgresql://dituser:ditpass@db:5432/ditlibrary
      BOOKS_SERVICE_URL: http://books-service:5001
      USERS_SERVICE_URL: http://users-service:5002
    depends_on:
      db:
        condition: service_healthy
      books-service:
        condition: service_healthy
      users-service:
        condition: service_healthy
    networks:
      - dit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5003/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Frontend (Nginx) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dit-frontend
    ports:
      - "80:80"
    depends_on:
      - books-service
      - users-service
      - loans-service
    networks:
      - dit-network
    restart: unless-stopped

networks:
  dit-network:
    driver: bridge
    name: dit-network

volumes:
  postgres_data:
    name: dit-postgres-data
